name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI_POSTGRES_DB: habis_finance_api_test
      CI_POSTGRES_USER: habis_finance_ci
      CI_POSTGRES_PASSWORD: habis_finance_ci_password

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ env.CI_POSTGRES_DB }}
          POSTGRES_USER: ${{ env.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habis_finance_ci -d habis_finance_api_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_pgsql, pgsql
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --ansi

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ env.CI_POSTGRES_DB }}
          DB_USERNAME: ${{ env.CI_POSTGRES_USER }}
          DB_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyze

      - name: Analyze API documentation
        run: php artisan scramble:analyze
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ env.CI_POSTGRES_DB }}
          DB_USERNAME: ${{ env.CI_POSTGRES_USER }}
          DB_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}

      - name: Run test suite
        run: composer test
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ${{ env.CI_POSTGRES_DB }}
          DB_USERNAME: ${{ env.CI_POSTGRES_USER }}
          DB_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}

      - name: Run production readiness checker
        run: |
          APP_KEY="$(php -r 'echo "base64:".base64_encode(random_bytes(32));')" \
            php artisan app:production-readiness-check
        env:
          APP_ENV: production
          APP_DEBUG: false
          CACHE_STORE: database
          SESSION_DRIVER: database
          QUEUE_CONNECTION: database
          MONEY_DEFAULT_CURRENCY: XAF
