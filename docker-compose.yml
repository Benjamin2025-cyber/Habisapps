services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: habis-finance-api:latest
    container_name: habis-finance-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://api.abbisapps.site}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-habis_finance_api}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.habis-finance-api.rule=Host(`api.abbisapps.site`)
      - traefik.http.routers.habis-finance-api.entrypoints=websecure
      - traefik.http.routers.habis-finance-api.tls=true
      - traefik.http.routers.habis-finance-api.tls.certresolver=letsencrypt
      - traefik.http.services.habis-finance-api.loadbalancer.server.port=8000

networks:
  proxy:
    external: true
